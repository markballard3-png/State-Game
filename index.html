<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>State Game</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">States & Capitals</p>
        <h1>Learn every state one round at a time.</h1>
        <p class="hero-copy">
          Start with a simple multiple-choice quiz and build from here.
        </p>
      </section>

      <section class="game-card" aria-live="polite">
        <div class="game-meta">
          <span id="progress">Question 1</span>
          <span id="score">Score: 0</span>
        </div>

        <h2 id="prompt">Loading question…</h2>
        <div id="choices" class="choices"></div>

        <div class="actions">
          <button id="next-button" class="secondary-button" type="button" disabled>
            Next question
          </button>
          <button id="reset-button" class="ghost-button" type="button">
            Reset game
          </button>
        </div>

        <p id="feedback" class="feedback"></p>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
